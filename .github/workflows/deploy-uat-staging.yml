name: Build and deploy to UAT staging

on:
  workflow_dispatch:
  push:
    branches:
      - release/uat

env:
  AZURE_FUNCTIONAPP_NAME: cdh-uat-af-01
  AZURE_FUNCTIONAPP_SLOT: staging
  JAVA_VERSION: "17"

jobs:
  build-and-deploy-uat-staging:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Azure Functions Core Tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4
          func --version

      - name: Build JAR
        shell: bash
        run: mvn -B -e clean package

      - name: Package Azure Functions
        shell: bash
        run: mvn -B -e azure-functions:package

      - name: Verify package exists
        shell: bash
        run: |
          ls -la target
          ls -la target/azure-functions
          ls -la target/azure-functions/cdh-uat-af-01 || true
          ls -la target/azure-functions/cdh-dev-af-01 || true

      - name: Detect package folder
        shell: bash
        run: |
          if [ -d "target/azure-functions/cdh-uat-af-01" ]; then
            echo "FUNCTION_PACKAGE=target/azure-functions/cdh-uat-af-01" >> $GITHUB_ENV
          elif [ -d "target/azure-functions/cdh-dev-af-01" ]; then
            echo "FUNCTION_PACKAGE=target/azure-functions/cdh-dev-af-01" >> $GITHUB_ENV
          else
            echo "No Azure Functions package folder found"
            exit 1
          fi

      - name: Deploy to Azure Functions UAT staging
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: ${{ env.AZURE_FUNCTIONAPP_SLOT }}
          package: ${{ env.FUNCTION_PACKAGE }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_UAT_STAGING }}
