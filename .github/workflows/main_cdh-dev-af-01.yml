name: Build and deploy Java Azure Function

on:
  push:
    branches: [ "main" ]

env:
  AZURE_FUNCTIONAPP_NAME: cdh-dev-af-01
  JAVA_VERSION: "17"
  PROJECT_DIR: "."   # mets "morning-check-semarchy" si ton pom.xml est dans un sous-dossier

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo tree
        shell: bash
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "---- find pom.xml ----"
          find . -maxdepth 4 -name "pom.xml" -print
          

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Azure Functions Core Tools (v4)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4
          func --version

      - name: Build and Package Azure Functions
        shell: bash
        run: mvn -B -f ${{ env.PROJECT_DIR }}/pom.xml clean azure-functions:package

      - name: Detect Azure Functions package folder
        shell: bash
        run: |
          BASE="${{ env.PROJECT_DIR }}/target/azure-functions"
          echo "=== listing $BASE ==="
          ls -la "$BASE" || true
          PKG=$(find "$BASE" -maxdepth 1 -mindepth 1 -type d | head -n 1)
          echo "Detected package folder: $PKG"
          if [ -z "$PKG" ]; then
            echo "No package folder found under $BASE"
            exit 1
          fi
          echo "FUNCTION_PACKAGE=$PKG" >> $GITHUB_ENV

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.FUNCTION_PACKAGE }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
