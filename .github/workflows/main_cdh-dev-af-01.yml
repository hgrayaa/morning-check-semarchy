name: Build and deploy Java Azure Function

on:
  push:
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_NAME: cdh-dev-af-01
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:

      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug repository structure
      - name: Debug repository structure
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "----- FIND pom.xml -----"
          find . -maxdepth 4 -name "pom.xml" -print

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # Install Azure Functions Core Tools
      - name: Install Azure Functions Core Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4
          func --version

      # Verify source code exists
      - name: Debug Java sources
        run: |
          echo "----- Java sources -----"
          find src -maxdepth 4 -type f -print || true

          echo "----- Function annotations -----"
          grep -R "@FunctionName" src/main/java || true
          grep -R "@TimerTrigger" src/main/java || true

      # Build project
      - name: Build project
        run: mvn -B -e clean compile

      # Package Azure Functions
      - name: Package Azure Functions
        run: mvn -B -e azure-functions:package

      # Debug build output
      - name: Debug build output
        run: |
          echo "----- TARGET -----"
          ls -la target || true

          echo "----- AZURE FUNCTIONS FOLDER -----"
          ls -la target/azure-functions || true

          echo "----- FIND PACKAGE -----"
          find target -maxdepth 4 -type d -name "azure-functions" -print || true

      # Detect function package
      - name: Detect Azure Function package folder
        run: |
          BASE="target/azure-functions"

          if [ ! -d "$BASE" ]; then
            echo "Azure Functions package folder not found"
            exit 1
          fi

          PKG=$(find "$BASE" -maxdepth 1 -mindepth 1 -type d | head -n 1)

          echo "Detected package folder: $PKG"

          if [ -z "$PKG" ]; then
            echo "No package found"
            exit 1
          fi

          echo "FUNCTION_PACKAGE=$PKG" >> $GITHUB_ENV

      # Deploy to Azure
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.FUNCTION_PACKAGE }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
