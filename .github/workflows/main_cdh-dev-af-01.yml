name: Build and deploy Java Azure Function

on:
  push:
    branches: [ "main" ]

env:
  AZURE_FUNCTIONAPP_NAME: cdh-dev-af-01
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug repo + Maven
        shell: bash
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "POM:"
          ls -la pom.xml
          echo "Java:"
          java -version || true
          echo "Maven:"
          mvn -version

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Azure Functions Core Tools (v4)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4
          func --version

      - name: Build and Package Azure Functions (verbose)
        shell: bash
        run: |
          mvn -B -e -X clean azure-functions:package

      - name: Debug build output
        shell: bash
        run: |
          echo "=== target ==="
          ls -la target || true
          echo "=== target/azure-functions ==="
          ls -la target/azure-functions || true
          echo "=== find azure-functions folders ==="
          find target -maxdepth 4 -type d -name "azure-functions" -print || true

      - name: Detect Azure Functions package folder
        shell: bash
        run: |
          BASE="target/azure-functions"
          PKG=$(find "$BASE" -maxdepth 1 -mindepth 1 -type d | head -n 1 || true)
          echo "Detected package folder: $PKG"
          if [ -z "$PKG" ]; then
            echo "No package folder found under $BASE"
            exit 1
          fi
          echo "FUNCTION_PACKAGE=$PKG" >> $GITHUB_ENV

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.FUNCTION_PACKAGE }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
