name: Build and deploy Java Azure Function

on:
  push:
    branches: [ "main" ]

env:
  AZURE_FUNCTIONAPP_NAME: cdh-dev-af-01
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Azure Functions Core Tools (v4)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4
          func --version

      - name: Build and Package Azure Functions
        shell: bash
        run: mvn -B clean azure-functions:package

      - name: Debug build output
        shell: bash
        run: |
          echo "=== List target ==="
          ls -la target || true
          echo "=== List target/azure-functions ==="
          ls -la target/azure-functions || true
          echo "=== Find package directories ==="
          find target/azure-functions -maxdepth 2 -type d -print || true

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: target/azure-functions/morning-check-semarchy
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
